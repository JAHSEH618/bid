# Alembic 配置(D-O,§9 / §17.2)。
#
# 入口:容器 docker/entrypoint.sh 跑 ``alembic -c /app/backend/alembic.ini
# upgrade head``,完成后才 ``exec supervisord``,保证 schema 就位才起 HTTP/worker。
#
# DSN 不写在这里 —— 由 ``migrations/env.py`` 用 settings.alembic_sync_dsn
# (``postgresql+psycopg://...``)实时拼装,避免 .env 里塞 DATABASE_URL
# 字面值导致 ``${POSTGRES_PASSWORD}`` 不展开(§6.3 D-W)。

[alembic]
script_location = migrations
prepend_sys_path = src
version_path_separator = os
sqlalchemy.url =


[post_write_hooks]


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
