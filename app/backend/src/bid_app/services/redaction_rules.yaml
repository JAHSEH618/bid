# bid-app 默认脱敏规则（PR-M6-1 / D3）。
#
# 可被环境变量 BID_APP_REDACTION_DICT_PATH 覆盖（项目级私有词典）。
# 修改本文件后需重启 backend 让缓存失效。

patterns:
  # 身份证:17 位数字 + 末位数字或 X/x,前后不能再有数字(避免吃 19 位串)
  idcard: '(?<!\d)\d{17}[\dXx](?!\d)'
  # 中国大陆手机:1[3-9] 开头共 11 位,前后不能再有数字
  phone: '(?<!\d)1[3-9]\d{9}(?!\d)'
  # 邮箱:常见 RFC 子集
  email: '[\w.+-]+@[\w-]+(?:\.[\w-]+)+'
  # 项目编号:大写字母 2+ 段 + 可选 dash + 数字 4+ 段
  project: '\b[A-Z]{2,}-?\d{4,}\b'

# ORG 检测:把中文姓名后缀拼成一个综合规则
# `[一-龥]{2,12}(?:公司|集团|院|局|中心|研究所)`
org_suffixes:
  - 公司
  - 集团
  - 院
  - 局
  - 中心
  - 研究所

# 跳过脱敏的字面值（用于通用词,避免被误吃为 ORG）。
default_allowlist:
  - 中国
  - 中华人民共和国
  - 国务院
  - 国家发改委
  - 北京
  - 上海
  - 深圳
